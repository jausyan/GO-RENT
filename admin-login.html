<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Login - GoRent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    /* Hide body until identity is ready */
    body.loading {
      opacity: 0;
    }
    body.ready {
      opacity: 1;
      transition: opacity 0.3s ease-in;
    }
  </style>
</head>
<body class="loading bg-gradient-to-br from-[#0d1117] via-[#161b22] to-[#0d1117] flex items-center justify-center min-h-screen p-4">

  <div class="w-full max-w-md">
    <!-- Header Card -->
    <div class="bg-gradient-to-r from-[#1c2128] to-[#161b22] border border-[#30363d] rounded-t-2xl p-8 shadow-2xl">
      <div class="flex items-center justify-center mb-4">
        <img src="images/JMMI-rm.png" alt="JMMI Logo" class="w-12 h-12 mr-3 object-contain" />
        <h1 class="text-3xl font-bold text-white">JMMI GoRent</h1>
      </div>
      <p class="text-center text-[#8b949e] text-sm">Admin Panel Login</p>
    </div>

    <!-- Login Card -->
    <div class="bg-[#0d1117] border border-t-0 border-[#30363d] rounded-b-2xl p-8 shadow-2xl">
      
      <!-- Welcome Message -->
      <div class="text-center mb-6">
        <svg class="w-16 h-16 text-[#1f6feb] mx-auto mb-4" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
        </svg>
        <h2 class="text-xl font-bold text-[#c9d1d9] mb-2">Selamat Datang Admin</h2>
        <p class="text-[#8b949e] text-sm">Silakan login menggunakan akun Gmail yang terdaftar</p>
      </div>

      <!-- Login Button -->
      <button 
        id="loginButton"
        class="w-full bg-gradient-to-r from-[#1f6feb] to-[#58a6ff] text-white font-semibold py-3 px-4 rounded-lg hover:from-[#388bfd] hover:to-[#79c0ff] focus:outline-none focus:ring-2 focus:ring-[#1f6feb]/50 transition-all duration-200 shadow-lg hover:shadow-xl transform hover:scale-105 active:scale-95 flex items-center justify-center"
      >
        <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
        </svg>
        Login dengan Netlify Identity
      </button>

      <!-- Info Box -->
      <div class="mt-6 bg-blue-900/20 border border-blue-700/50 rounded-lg p-4">
        <p class="text-[#58a6ff] text-xs text-center">
          🔒 Hanya admin yang terdaftar yang dapat mengakses panel
        </p>
      </div>

      <!-- Back to Home -->
      <div class="mt-6 text-center">
        <a href="index.html" class="text-[#58a6ff] hover:text-[#79c0ff] text-sm transition-colors">
          ← Kembali ke Halaman Utama
        </a>
      </div>

    </div>
  </div>

  <script>
    const loginButton = document.getElementById('loginButton');

    // Wait for Netlify Identity to be ready
    function initIdentity() {
      if (window.netlifyIdentity) {
        netlifyIdentity.on('init', user => {
          // Identity is initialized
          if (user) {
            // User is already logged in, redirect immediately
            window.location.href = 'admin-panel.html';
          } else {
            // No user, show login page
            document.body.classList.remove('loading');
            document.body.classList.add('ready');
          }
        });

        // Login button click handler
        loginButton.addEventListener('click', () => {
          netlifyIdentity.open();
        });

        // Listen for login event
        netlifyIdentity.on('login', (user) => {
          console.log('Login successful:', user);
          // Redirect to admin panel
          window.location.href = 'admin-panel.html';
        });

        // Listen for error event
        netlifyIdentity.on('error', (err) => {
          console.error('Identity error:', err);
          alert('Terjadi kesalahan saat login. Silakan coba lagi.');
        });

        // Initialize
        netlifyIdentity.init();
      } else {
        // Fallback if netlifyIdentity doesn't load
        setTimeout(() => {
          document.body.classList.remove('loading');
          document.body.classList.add('ready');
        }, 1000);
      }
    }

    // Initialize when page loads
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initIdentity);
    } else {
      initIdentity();
    }
  </script>

</body>
</html>
